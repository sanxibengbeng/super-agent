services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: super-agent-postgres
    environment:
      POSTGRES_USER: superagent
      POSTGRES_PASSWORD: superagent123
      POSTGRES_DB: super_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: super-agent-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: super-agent-backend
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: development
      LOG_LEVEL: debug
      CORS_ORIGIN: "*"
      DATABASE_URL: postgresql://superagent:superagent123@postgres:5432/super_agent
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_MODE: local
      JWT_SECRET: super-agent-local-dev-jwt-secret-2026
      AWS_REGION: us-east-1
      AWS_EC2_METADATA_SERVICE_ENDPOINT: http://169.254.169.254
      S3_BUCKET_NAME: super-agent-local-dev-workspace
      SKILLS_S3_BUCKET: super-agent-local-dev-workspace
      AGENT_RUNTIME: agentcore
      AGENT_WORKSPACE_BASE_DIR: /tmp/workspaces
      CLAUDE_MODEL: claude-sonnet-4-5-20250929
      AGENTCORE_RUNTIME_ARN: arn:aws:bedrock-agentcore:us-east-1:873543029686:runtime/SuperAgentEks_Runtime-3xzeklD05D
      AGENTCORE_EXECUTION_ROLE_ARN: arn:aws:iam::873543029686:role/SuperAgentEks-AgentCoreRole
      AGENTCORE_BACKEND_API_URL: http://backend:3000
      AGENTCORE_WORKSPACE_S3_BUCKET: super-agent-local-dev-workspace
      PROCESS_ROLE: all
      CLAUDE_CODE_USE_BEDROCK: "1"
    extra_hosts:
      - "169.254.169.254:host-gateway"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: super-agent-frontend
    environment:
      VITE_API_BASE_URL: ""
      VITE_USE_MOCK: "false"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: super-agent-nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
